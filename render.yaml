services:
  - type: web
    name: zia-flow
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: APP_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APP_TIMEZONE
        value: "America/Santo_Domingo"
      - key: REMINDER_ENABLED
        value: "true"
      - key: REMINDER_AUTO_RUN
        value: "true"
      - key: REMINDER_INTERVAL_MINUTES
        value: "15"
      - key: REMINDER_ASSIGNMENT_EMAILS
        value: "true"
      - key: REMINDER_DAILY_DIGEST
        value: "true"
      - key: REMINDER_DIGEST_HOUR
        value: "8"
      - key: REMINDER_WEEKEND_DIGEST
        value: "true"
      - key: REMINDER_DUE_SOON
        value: "true"
      - key: REMINDER_DUE_SOON_HOURS
        value: "24"
      - key: REMINDER_OVERDUE
        value: "true"
      - key: REMINDER_OVERDUE_REPEAT_HOURS
        value: "24"
